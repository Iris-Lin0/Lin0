    <!-- <i class="fas fa-map-marked-alt"></i>：这是一个 图标标签，使用了 Font Awesome 图标库。
fas 表示 Font Awesome 的 Solid 风格（实心图标）。

fa-map-marked-alt 是图标的名称，表示一个带标记的地图图标（类似📍但更丰富）。

<i> 原本表示斜体文本，但这里只用来承载图标，没有文本内容。图标库通过 CSS 伪元素在元素中显示一个字体图标。 -->

    <main>
