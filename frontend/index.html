<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <link rel="stylesheet" href="css/style.css">

<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-globe-asia"></i> 我的旅游梦</h1>
